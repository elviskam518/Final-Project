{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Interactive Demo</h2>
  <p>Upload CSV, run intermediate analysis (<code>b.py</code>), then start a long-running real model job (<code>c.py</code> / <code>more strict .py</code>).</p>

  <form id="analyze-form">
    <label>Upload CSV <input type="file" name="file" accept=".csv" required /></label>
    <label>Top quantile for proxy qualification
      <input type="number" name="top_quantile" value="0.4" min="0.1" max="0.6" step="0.05" />
    </label>
    <button type="submit">1) Run Intermediate Analysis</button>
  </form>

  <div id="analysis-output"></div>

  <form id="job-form" class="hidden">
    <input type="hidden" name="upload_id" />
    <label>Choose model/mode
      <select name="model_key">
        <option value="baseline_mlp">Baseline MLP</option>
        <option value="standalone_adv">Standalone adversarial baseline</option>
        <option value="fair_cvae_adv_only">Fair CVAE adv_only</option>
        <option value="fair_cvae_no_adv">Fair CVAE no_adv</option>
        <option value="fair_cvae_full">Fair CVAE full</option>
      </select>
    </label>
    <label><input type="checkbox" name="run_latent" value="true" /> Run latent-space visualisation after training (if applicable)</label>
    <button type="submit">2) Start Background Job</button>
  </form>

  <h3>Job Status</h3>
  <p id="job-status">No job started.</p>
  <pre id="job-logs"></pre>

  <div id="model-output"></div>
</section>
<script src="/static/demo.js"></script>
{% endblock %}
